name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts

  test-install:
    name: Test Install Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test install (latest)
        env:
          VERSION: latest
        run: |
          sudo bash scripts/install.sh
          kube-events version

  test-action:
    name: Test Action
    runs-on: ubuntu-latest
    needs: [shellcheck, test-install]
    steps:
      - uses: actions/checkout@v4

      - name: Setup kind cluster
        uses: helm/kind-action@v1

      - name: Deploy test resources
        run: |
          kubectl create namespace test-events
          kubectl apply -f - <<'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: test-pod
            namespace: test-events
          spec:
            containers:
              - name: nginx
                image: nginx:1.27
          YAML
          kubectl wait --for=condition=ready pod/test-pod -n test-events --timeout=60s

      - name: Run kube-events action
        id: events
        uses: ./
        with:
          namespace: test-events
          since: 5m
          output: markdown
          comment: 'false'

      - name: Verify outputs
        run: |
          echo "Warning count: ${{ steps.events.outputs.warning-count }}"
          echo "Has warnings: ${{ steps.events.outputs.has-warnings }}"
          echo "Result: ${{ steps.events.outputs.result }}"

  test-action-warnings:
    name: Test Action (warnings)
    runs-on: ubuntu-latest
    needs: [shellcheck, test-install]
    steps:
      - uses: actions/checkout@v4

      - name: Setup kind cluster
        uses: helm/kind-action@v1

      - name: Deploy bad pod
        run: |
          kubectl create namespace test-warnings
          kubectl apply -f - <<'YAML'
          apiVersion: v1
          kind: Pod
          metadata:
            name: bad-image
            namespace: test-warnings
          spec:
            containers:
              - name: app
                image: nginx:this-tag-does-not-exist-999
          YAML
          sleep 15

      - name: Run kube-events action (warning filter)
        id: events
        uses: ./
        with:
          namespace: test-warnings
          type: Warning
          since: 5m
          output: json
          comment: 'false'

      - name: Verify warnings detected
        run: |
          echo "Warning count: ${{ steps.events.outputs.warning-count }}"
          echo "Has warnings: ${{ steps.events.outputs.has-warnings }}"
          if [ "${{ steps.events.outputs.has-warnings }}" != "true" ]; then
            echo "[WARN] Expected warnings but none detected (may depend on timing)"
          fi

  test-action-groupby:
    name: Test Action (group-by)
    runs-on: ubuntu-latest
    needs: [shellcheck, test-install]
    steps:
      - uses: actions/checkout@v4

      - name: Setup kind cluster
        uses: helm/kind-action@v1

      - name: Deploy test resources
        run: |
          kubectl create namespace test-groupby
          kubectl apply -f - <<'YAML'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: web-app
            namespace: test-groupby
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: web
            template:
              metadata:
                labels:
                  app: web
              spec:
                containers:
                  - name: web
                    image: nginx:1.27
          YAML
          kubectl wait --for=condition=available deploy/web-app -n test-groupby --timeout=60s

      - name: Test group-by namespace
        id: group-ns
        uses: ./
        with:
          namespace: test-groupby
          group-by: namespace
          since: 5m
          output: markdown
          comment: 'false'

      - name: Test group-by kind
        id: group-kind
        uses: ./
        with:
          namespace: test-groupby
          group-by: kind
          since: 5m
          output: table
          comment: 'false'

      - name: Test group-by reason
        id: group-reason
        uses: ./
        with:
          namespace: test-groupby
          group-by: reason
          since: 5m
          output: json
          comment: 'false'

      - name: Verify outputs
        run: |
          echo "=== Group by namespace ==="
          echo "Result: ${{ steps.group-ns.outputs.result }}"
          echo "=== Group by kind ==="
          echo "Result: ${{ steps.group-kind.outputs.result }}"
          echo "=== Group by reason ==="
          echo "Warning count: ${{ steps.group-reason.outputs.warning-count }}"
          echo "[PASS] Group-by test passed"

  ci-result:
    name: CI Result
    if: always()
    needs: [shellcheck, test-install, test-action, test-action-warnings, test-action-groupby]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.shellcheck.result }}" != "success" ]] || \
             [[ "${{ needs.test-install.result }}" != "success" ]] || \
             [[ "${{ needs.test-action.result }}" != "success" ]] || \
             [[ "${{ needs.test-action-warnings.result }}" != "success" ]] || \
             [[ "${{ needs.test-action-groupby.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
